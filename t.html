<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats Section</title>
<link rel="stylesheet" href="t.css">
</head>
<body>

<section class="stats-section">
  <div class="stats-container">

    <div class="stat-box">
      <h2 class="counter" data-target="10000">0</h2>
      <hr>
      <h3>Websites launched</h3>
      <p>Helping brands make their mark online.</p>
    </div>

    <div class="stat-box">
      <h2 class="counter" data-target="50000">0</h2>
      <hr>
      <h3>Users reached</h3>
      <p>Our designs engage millions globally.</p>
    </div>

    <div class="stat-box">
      <h2 class="counter percent" data-target="99">0</h2>
      <hr>
      <h3>Client satisfaction rate</h3>
      <p>We build long-term partnerships through proven results.</p>
    </div>

  </div>
</section>

<script src="t.js"></script>
</body>
</html>
